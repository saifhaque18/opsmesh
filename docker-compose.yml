version: "3.9"

services:
  # ─── PostgreSQL ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: opsmesh-db
    environment:
      POSTGRES_USER: opsmesh
      POSTGRES_PASSWORD: opsmesh
      POSTGRES_DB: opsmesh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsmesh"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: opsmesh-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: opsmesh-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://opsmesh:opsmesh@postgres:5432/opsmesh
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: uvicorn src.opsmesh.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
